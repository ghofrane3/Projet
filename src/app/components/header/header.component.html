<header class="header" [class.scrolled]="isScrolled">
  <div class="header-container">

    <!-- Logo -->
    <a routerLink="/" class="logo">
      <span class="logo-text">Fashion</span>
      <span class="logo-accent">Store</span>
    </a>

    <!-- Navigation -->
    <nav class="header-nav">
      <a routerLink="/" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        ACCUEIL
      </a>
      <a [routerLink]="['/products']" class="nav-link" routerLinkActive="active">
        BOUTIQUE
      </a>
      <a [routerLink]="['category/:subcategory']" [queryParams]="{gender: 'Homme'}" class="nav-link">
        HOMME
      </a>
      <a [routerLink]="['category/:subcategory']" [queryParams]="{gender: 'Femme'}" class="nav-link">
        FEMME
      </a>
    </nav>

    <!-- Actions -->
    <div class="header-actions">

      <!-- Compte -->
      <div class="account-menu" *ngIf="!isAuthenticated">
        <button class="icon-btn" routerLink="/login" title="Se connecter">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </div>

      <!-- User connecté -->
      <div class="account-menu" *ngIf="isAuthenticated">
        <button class="icon-btn" routerLink="/account" title="Mon compte">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </div>

      <!-- Panier -->
      <button class="icon-btn cart-btn" (click)="toggleCart()" title="Panier">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M9 2L7.5 5.5M15 2l1.5 3.5M3 7.5h18M5 7.5l1.5 12.5h11L19 7.5"/>
          <circle cx="9" cy="21" r="1"/>
          <circle cx="15" cy="21" r="1"/>
        </svg>
        <span class="cart-count" *ngIf="cartItemsCount > 0">{{ cartItemsCount }}</span>
      </button>
    </div>
  </div>
</header>

<!-- Cart Sidebar -->
<div class="cart-overlay" [class.active]="cartOpen" (click)="closeCart()"></div>

<aside class="cart-sidebar" [class.open]="cartOpen">
  <div class="cart-header">
    <h3>Votre Panier</h3>
    <button class="close-btn" (click)="closeCart()">×</button>
  </div>

  <!-- Panier vide -->
  <div class="cart-empty" *ngIf="cartItems.length === 0">
    <div class="empty-icon">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M9 2L7.5 5.5M15 2l1.5 3.5M3 7.5h18M5 7.5l1.5 12.5h11L19 7.5"/>
        <circle cx="9" cy="21" r="1"/>
        <circle cx="15" cy="21" r="1"/>
      </svg>
      <svg class="lock-icon" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h4>Votre panier est vide</h4>
    <p>Découvrez nos collections</p>
    <button class="btn btn-primary" (click)="closeCart()" routerLink="/products">
      EXPLORER LA BOUTIQUE
    </button>
  </div>

  <!-- Panier avec items -->
  <div class="cart-content" *ngIf="cartItems.length > 0">
    <div class="cart-items">
      <div class="cart-item" *ngFor="let item of cartItems">
        <div class="item-image">
          <img [src]="item.image || 'assets/placeholder.jpg'" [alt]="item.name">
        </div>
        <div class="item-details">
          <h4>{{ item.name }}</h4>
          <p class="item-price">{{ item.price }} €</p>
          <div class="item-quantity">
            <button (click)="updateQuantity(item.productId, item.quantity - 1)">−</button>
            <span>{{ item.quantity }}</span>
            <button (click)="updateQuantity(item.productId, item.quantity + 1)">+</button>
          </div>
        </div>
        <button class="remove-btn" (click)="removeFromCart(item.productId)">×</button>
      </div>
    </div>

    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <strong>{{ getCartTotal() }} €</strong>
      </div>
      <button class="btn btn-primary btn-block" (click)="goToCheckout()">
        PASSER LA COMMANDE
      </button>
    </div>
  </div>
</aside>
